<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duni Running Chart</title>
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f7; color: #2c3e50; }

.app { max-width: 1500px; margin: 0 auto; padding: 24px 20px; }

/* ── TITLE BAR ── */
.title-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
}
h1 { font-size: 1.4rem; font-weight: 700; color: #1a2340; letter-spacing: -0.3px; }

.title-logo-wrap { position: relative; flex-shrink: 0; cursor: pointer; }
.title-logo {
  width: 52px; height: 52px; border-radius: 50%;
  object-fit: cover; border: 3px solid #4a80e8;
  box-shadow: 0 2px 8px rgba(74,128,232,.3); display: block;
}
.title-logo-upload {
  display: inline-flex; align-items: center; justify-content: center;
  width: 52px; height: 52px; border-radius: 50%;
  border: 2.5px dashed #c8ccd8; background: white; cursor: pointer;
  color: #b0b5c5; font-size: 22px; transition: border-color .2s, color .2s;
}
.title-logo-upload:hover { border-color: #4a80e8; color: #4a80e8; }
.title-logo-upload input[type="file"] { display: none; }
.title-logo-overlay {
  position: absolute; inset: 0; border-radius: 50%;
  background: rgba(0,0,0,.45); display: flex; align-items: center;
  justify-content: center; opacity: 0; transition: opacity .2s;
  font-size: 13px; color: white;
}
.title-logo-wrap:hover .title-logo-overlay { opacity: 1; }

/* ── SPREADSHEET ── */
.sheet-card {
  background: white;
  border-radius: 14px;
  box-shadow: 0 2px 16px rgba(0,0,0,.07);
  padding: 0;
  margin-bottom: 16px;
  overflow: hidden;
}
.sheet-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 10px;
  border-bottom: 1px solid #eef0f5;
}
.sheet-header span { font-weight: 600; font-size: .9rem; color: #555; }

.table-scroll { overflow-x: auto; }
table { border-collapse: collapse; width: 100%; min-width: max-content; }

thead tr { background: #f7f8fc; }
th {
  border: 1px solid #e5e8f0;
  font-size: .72rem;
  font-weight: 700;
  color: #888;
  text-align: center;
  padding: 0;
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 3;
  background: #f7f8fc;
}
th.col-a { min-width: 140px; left: 0; z-index: 5; background: #eef1fa; }
th.col-b { min-width: 72px; left: 140px; z-index: 5; background: #eef1fa; }
th .th-inner { padding: 8px 10px; }

.year-input {
  width: 100%;
  border: none;
  background: transparent;
  text-align: center;
  font-weight: 700;
  font-size: .72rem;
  color: #777;
  padding: 8px 4px;
  outline: none;
  cursor: text;
}
.year-input:focus { background: #e8f0fe; color: #2660d6; }

tbody tr:nth-child(even) td { background: #fafbfd; }
tbody tr:hover td { background: #f0f5ff !important; }

td {
  border: 1px solid #e8eaf0;
  padding: 0;
  vertical-align: middle;
}
td.col-a { position: sticky; left: 0; z-index: 2; background: white; min-width: 140px; }
td.col-b { position: sticky; left: 140px; z-index: 2; background: white; min-width: 72px; }
tbody tr:nth-child(even) td.col-a,
tbody tr:nth-child(even) td.col-b { background: #fafbfd; }
tbody tr:hover td.col-a,
tbody tr:hover td.col-b { background: #f0f5ff !important; }

.name-cell-inner { display: flex; align-items: center; gap: 6px; padding: 4px 8px; }
.color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.name-input {
  border: none; background: transparent; font-size: .84rem;
  width: 100%; outline: none; color: #2c3e50;
}
.name-input:focus { background: #f0f5ff; border-radius: 4px; }
.name-input::placeholder { color: #c0c5d0; }

.img-cell-inner {
  display: flex; align-items: center; justify-content: center;
  padding: 5px; height: 46px;
}
.upload-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 50%;
  border: 2px dashed #c8ccd8; background: white; cursor: pointer;
  color: #b0b5c5; font-size: 20px; line-height: 1;
  transition: border-color .2s, color .2s; flex-shrink: 0;
}
.upload-btn:hover { border-color: #4a80e8; color: #4a80e8; }
.upload-btn input[type="file"] { display: none; }

.thumb-wrap { position: relative; cursor: pointer; }
.thumb { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid #dde; display: block; }
.thumb-overlay {
  position: absolute; inset: 0; border-radius: 50%;
  background: rgba(0,0,0,.45); display: flex; align-items: center;
  justify-content: center; opacity: 0; transition: opacity .2s;
  font-size: 12px; color: white;
}
.thumb-wrap:hover .thumb-overlay { opacity: 1; }

td.val-td { min-width: 76px; }
.val-input {
  width: 100%; border: none; background: transparent;
  text-align: center; font-size: .84rem; padding: 6px 4px; outline: none; color: #2c3e50;
}
.val-input:focus { background: #e8f5e9; }
.val-input::-webkit-outer-spin-button,
.val-input::-webkit-inner-spin-button { opacity: .4; }

.sheet-footer { display: flex; gap: 8px; padding: 10px 18px 14px; border-top: 1px solid #eef0f5; }

/* ── BUTTONS ── */
.btn {
  padding: 7px 16px; border: none; border-radius: 8px;
  font-size: .82rem; font-weight: 600; cursor: pointer;
  transition: background .15s, transform .1s; white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn-blue  { background: #4a80e8; color: white; }
.btn-blue:hover  { background: #2f63c8; }
.btn-gray  { background: #eef0f5; color: #555; }
.btn-gray:hover  { background: #dde0ea; }
.btn-red   { background: #fdecea; color: #d32f2f; }
.btn-red:hover   { background: #f5ccc8; }
.btn-green { background: #e6f4ea; color: #2e7d32; }
.btn-green:hover { background: #c8e6c9; }
.btn-purple { background: #f3e5f5; color: #6a1b9a; }
.btn-purple:hover { background: #e1bee7; }
.btn-teal  { background: #e0f2f1; color: #00695c; }
.btn-teal:hover  { background: #b2dfdb; }

/* ── GENERATE STRIP ── */
.generate-strip { text-align: center; margin-bottom: 16px; }

/* ── CHART CARD ── */
.chart-card {
  background: white; border-radius: 14px;
  box-shadow: 0 2px 16px rgba(0,0,0,.07); padding: 20px;
}

.controls {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px; flex-wrap: wrap;
}
.save-controls {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 18px; flex-wrap: wrap;
  padding: 10px 12px;
  background: #f8f9fc;
  border-radius: 10px;
  border: 1px solid #eef0f5;
}
.save-controls-label {
  font-size: .75rem; font-weight: 700; color: #aaa;
  text-transform: uppercase; letter-spacing: .5px;
  margin-right: 4px;
}

.ctrl-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 8px 18px; border: none; border-radius: 8px;
  font-size: .84rem; font-weight: 600; cursor: pointer; transition: background .15s;
}
.ctrl-btn.play-active   { background: #1a63e8; color: white; }
.ctrl-btn.play-inactive { background: #eef0f5; color: #444; }
.ctrl-btn.play-inactive:hover { background: #dde0ea; }
.ctrl-btn.replay { background: #eef0f5; color: #444; }
.ctrl-btn.replay:hover { background: #dde0ea; }

.speed-wrap {
  display: flex; align-items: center; gap: 8px;
  font-size: .82rem; color: #777; margin-left: auto;
}
input[type="range"] { accent-color: #4a80e8; cursor: pointer; }

.canvas-wrap { position: relative; }
canvas { display: block; width: 100%; border-radius: 6px; background: #fff; }

.big-year {
  position: absolute; right: 210px; bottom: 70px;
  font-size: 3rem; font-weight: 800;
  color: rgba(200,210,235,.6); pointer-events: none; letter-spacing: -1px;
}

/* Toast notification */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #1a2340; color: white; padding: 10px 22px;
  border-radius: 10px; font-size: .85rem; font-weight: 600;
  opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; z-index: 9999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }


/* ── AUTH / PROFILE EXTRAS ── */
.page { display:none; }
.page.active { display:block; }

.auth-bg {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#1a2340 0%,#2660d6 100%);
}
.auth-card {
  background:white; border-radius:20px; padding:40px 44px; width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.25); text-align:center;
}
.auth-logo { width:72px; height:72px; border-radius:50%; object-fit:cover; border:3px solid #4a80e8; box-shadow:0 4px 14px rgba(74,128,232,.3); margin-bottom:14px; }
.auth-title { font-size:1.5rem; font-weight:800; color:#1a2340; margin-bottom:4px; }
.auth-sub { font-size:.85rem; color:#888; margin-bottom:28px; }
.auth-tabs { display:flex; margin-bottom:24px; border-radius:10px; overflow:hidden; border:1.5px solid #e0e4f0; }
.auth-tab { flex:1; padding:9px; font-size:.85rem; font-weight:600; background:white; color:#888; border:none; cursor:pointer; transition:all .2s; }
.auth-tab.active { background:#2660d6; color:white; }
.auth-field { margin-bottom:14px; text-align:left; }
.auth-field label { display:block; font-size:.78rem; font-weight:600; color:#555; margin-bottom:5px; }
.auth-field input { width:100%; padding:10px 14px; border-radius:9px; border:1.5px solid #dde0ee; font-size:.9rem; outline:none; transition:border-color .2s; box-sizing:border-box; }
.auth-field input:focus { border-color:#2660d6; }
.auth-btn { width:100%; padding:12px; border-radius:10px; background:#2660d6; color:white; font-size:.95rem; font-weight:700; border:none; cursor:pointer; transition:background .2s; margin-top:6px; }
.auth-btn:hover { background:#1a4db8; }
.auth-btn:disabled { opacity:.6; cursor:not-allowed; }
.auth-error { color:#e53935; font-size:.8rem; margin-top:8px; min-height:18px; }

.profile-bg { min-height:100vh; background:#f0f2f7; padding:28px 20px; }
.profile-topbar { max-width:1100px; margin:0 auto 28px; display:flex; align-items:center; gap:14px; }
.profile-topbar h1 { font-size:1.4rem; font-weight:800; color:#1a2340; flex:1; }
.profile-avatar { width:44px; height:44px; border-radius:50%; object-fit:cover; border:2.5px solid #4a80e8; }
.profile-username { font-size:.85rem; font-weight:600; color:#555; }
.logout-btn { padding:8px 16px; border-radius:8px; background:white; color:#e53935; border:1.5px solid #ffc9c9; font-size:.8rem; font-weight:600; cursor:pointer; transition:background .2s; }
.logout-btn:hover { background:#fff5f5; }
.profile-section { max-width:1100px; margin:0 auto; }
.profile-section-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.profile-section-hdr span { font-size:1rem; font-weight:700; color:#1a2340; }
.new-graph-btn { padding:9px 20px; border-radius:9px; background:#2660d6; color:white; font-size:.85rem; font-weight:700; border:none; cursor:pointer; transition:background .2s; }
.new-graph-btn:hover { background:#1a4db8; }
.graphs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
.graph-card { background:white; border-radius:14px; padding:20px; cursor:pointer; box-shadow:0 2px 12px rgba(0,0,0,.07); transition:transform .18s,box-shadow .18s; position:relative; }
.graph-card:hover { transform:translateY(-3px); box-shadow:0 6px 22px rgba(0,0,0,.12); }
.graph-card-name { font-size:1rem; font-weight:700; color:#1a2340; margin-bottom:6px; }
.graph-card-meta { font-size:.75rem; color:#aaa; }
.graph-card-del { position:absolute; top:12px; right:12px; width:26px; height:26px; border-radius:50%; background:#fff0f0; color:#e53935; border:none; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s; }
.graph-card:hover .graph-card-del { opacity:1; }
.no-graphs { text-align:center; padding:48px 20px; color:#bbb; font-size:.9rem; }

.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; z-index:1000; }
.modal-bg.show { display:flex; }
.modal-card { background:white; border-radius:16px; padding:32px 36px; width:360px; box-shadow:0 16px 50px rgba(0,0,0,.2); }
.modal-card h3 { font-size:1.1rem; font-weight:700; color:#1a2340; margin-bottom:20px; }
.modal-card input { width:100%; padding:10px 14px; border-radius:9px; border:1.5px solid #dde0ee; font-size:.9rem; margin-bottom:16px; outline:none; transition:border-color .2s; box-sizing:border-box; }
.modal-card input:focus { border-color:#2660d6; }
.modal-btns { display:flex; gap:10px; }
.modal-btns button { flex:1; padding:10px; border-radius:9px; font-size:.85rem; font-weight:700; border:none; cursor:pointer; }
.modal-cancel { background:#f0f2f7; color:#666; }
.modal-ok { background:#2660d6; color:white; }

.editor-topbar { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
.back-btn { padding:8px 16px; border-radius:9px; background:white; color:#2660d6; border:1.5px solid #c0d0f8; font-size:.85rem; font-weight:600; cursor:pointer; transition:background .2s; display:flex; align-items:center; gap:6px; }
.back-btn:hover { background:#f0f5ff; }
.save-profile-btn { padding:9px 20px; border-radius:9px; background:#2e7d32; color:white; font-size:.85rem; font-weight:700; border:none; cursor:pointer; transition:background .2s; }
.save-profile-btn:hover { background:#1b5e20; }
.save-profile-btn:disabled { opacity:.6; cursor:not-allowed; }
.graph-name-wrap { display:flex; align-items:center; gap:8px; flex:1; }
.current-graph-name { font-size:1rem; font-weight:700; color:#1a2340; }
.graph-name-input { font-size:1rem; font-weight:700; color:#1a2340; border:1.5px solid #4a80e8; border-radius:7px; padding:4px 10px; outline:none; background:white; flex:1; max-width:320px; }
.rename-btn { width:28px; height:28px; border-radius:7px; background:white; border:1.5px solid #dde0ee; color:#888; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
.rename-btn:hover { border-color:#4a80e8; color:#4a80e8; background:#f0f5ff; }

</style>
</head>

        <span style="font-size:.75rem;color:#aaa">Edit names, upload photos, fill in values, set year headers</span>
      </div>
      <div class="table-scroll"><div id="tableWrap"></div></div>
      <div class="sheet-footer">
        <button class="btn btn-gray" onclick="addRow()">+ Row</button>
        <button class="btn btn-gray" onclick="addYear()">+ Year</button>
        <button class="btn btn-red"  onclick="removeLastRow()">&#8722; Last Row</button>
      </div>
    </div>
    <div class="generate-strip">
      <button class="btn btn-blue" style="padding:10px 32px;font-size:.9rem" onclick="generateChart()">&#9654; Generate Chart</button>
    </div>
    <div class="chart-card">
      <div class="controls">
        <button class="ctrl-btn play-inactive" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
        <button class="ctrl-btn replay" onclick="replayChart()">&#8635; Replay</button>
        <div class="speed-wrap">

          <input type="range" id="speedSlider" min="0.1" max="4" step="0.1" value="1" oninput="setSpeed(this.value)">
          <span id="speedLabel">1.0&times;</span>
        </div>
      </div>
      <div class="save-controls">
        <span class="save-controls-label">Save &amp; Share</span>
        <button class="btn btn-gray" onclick="savePNG()">&#128444; Save PNG</button>
        <button class="btn btn-green" onclick="saveData()">&#128190; Save JSON</button>
        <button class="btn btn-teal" onclick="document.getElementById('loadInput').click()">&#128194; Load JSON
          <input type="file" id="loadInput" accept=".json" style="display:none" onchange="loadData(event)">
        </button>
        <button class="btn btn-purple" onclick="exportHTML()">&#128279; Export HTML</button>
      </div>
      <div class="canvas-wrap">
        <canvas id="chart" height="480"></canvas>
        <div class="big-year" id="bigYear"></div>
      </div>
    </div>
  </div>
</div>

/* =====================================================
   STATE
===================================================== */
let currentUid      = null;
let currentUsername = '';
let currentGraphId  = null;

/* =====================================================
   HELPERS
===================================================== */
function usernameToEmail(u) {
  return u.toLowerCase().replace(/[^a-z0-9_-]/g,'') + '@dunirc.app';
}

function friendlyError(msg) {
  if(!msg) return 'Something went wrong. Try again.';
  if(msg.includes('Invalid login credentials')) return 'Incorrect username or password.';
  if(msg.includes('User already registered'))   return 'Username already taken.';
  if(msg.includes('Password should be'))        return 'Password must be at least 6 characters.';
  if(msg.includes('rate limit'))                return 'Too many attempts — try again later.';
  return 'Something went wrong. Try again.';
}

function setAuthError(msg) { document.getElementById('authError').textContent = msg; }

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* =====================================================
   AUTH STATE LISTENER
===================================================== */
sb.auth.onAuthStateChange(async (event, session) => {
  if(window.__EXPORT_MODE__) return;
  if(session && session.user) {
    currentUid = session.user.id;
    try {
      const { data } = await sb.from('profiles').select('username').eq('id', currentUid).single();
      currentUsername = (data && data.username) ? data.username : session.user.email.split('@')[0];
    } catch(e) {
      currentUsername = session.user.email.split('@')[0];
    }
    openProfile();
  } else {
    currentUid = null; currentUsername = '';
    showPage('loginPage');
  }
});

/* =====================================================
   AUTH UI
===================================================== */
function switchAuthTab(tab) {
  document.getElementById('authLoginForm').style.display    = tab==='login'    ? '' : 'none';
  document.getElementById('authRegisterForm').style.display = tab==='register' ? '' : 'none';
  document.getElementById('loginTab').classList.toggle('active',    tab==='login');
  document.getElementById('registerTab').classList.toggle('active', tab==='register');
  setAuthError('');
}

async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if(!u || !p) { setAuthError('Please enter username and password.'); return; }
  const btn = document.querySelector('#authLoginForm .auth-btn');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  try {
    const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 10000));
    const loginReq = sb.auth.signInWithPassword({ email: usernameToEmail(u), password: p });
    const { error } = await Promise.race([loginReq, timeout]);
    if(error) {
      setAuthError(friendlyError(error.message));
      btn.textContent = 'Sign In'; btn.disabled = false;
    }
    // onAuthStateChange handles navigation on success
  } catch(e) {
    setAuthError(e.message === 'timeout' ? 'Connection timed out. Check your internet and try again.' : 'Something went wrong. Try again.');
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
}

async function doRegister() {
  const u  = document.getElementById('regUser').value.trim();
  const p  = document.getElementById('regPass').value;
  const p2 = document.getElementById('regPass2').value;
  if(!u || !p)     { setAuthError('Please fill in all fields.'); return; }
  if(p !== p2)     { setAuthError('Passwords do not match.'); return; }
  if(u.length < 3) { setAuthError('Username must be at least 3 characters.'); return; }
  const btn = document.querySelector('#authRegisterForm .auth-btn');
  btn.textContent = 'Creating…'; btn.disabled = true;
  const { data, error } = await sb.auth.signUp({ email: usernameToEmail(u), password: p });
  if(error) {
    setAuthError(friendlyError(error.message));
    btn.textContent = 'Create Account'; btn.disabled = false;
    return;
  }
  if(data && data.user) {
    await sb.from('profiles').insert({ id: data.user.id, username: u });
  }
  // onAuthStateChange handles navigation
}

async function doLogout() {
  years=[...__defaultYears]; rows=[]; imgs={}; titleImg=null; chartData=null;
  currentGraphId=null;
  setAuthError('');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  await sb.auth.signOut();
}

/* =====================================================
   PROFILE PAGE
===================================================== */
async function openProfile() {
  document.getElementById('profileUsername').textContent = currentUsername;
  showPage('profilePage');
  await renderGraphCards();
}

async function renderGraphCards() {
  const grid = document.getElementById('graphsGrid');
  grid.innerHTML = '<div class="no-graphs">Loading…</div>';
  const { data, error } = await sb.from('graphs')
    .select('id, name, years, rows')
    .eq('user_id', currentUid)
    .order('updated_at', { ascending: false });
  if(error || !data) {
    grid.innerHTML = '<div class="no-graphs">Could not load graphs. Check your connection.</div>';
    return;
  }
  if(data.length === 0) {
    grid.innerHTML = '<div class="no-graphs">No graphs yet. Click \"+ New Graph\" to create one.</div>';
    return;
  }
  grid.innerHTML = data.map(g => `
    <div class="graph-card" onclick="openGraph('${g.id}')">
      <button class="graph-card-del" onclick="event.stopPropagation();deleteGraph('${g.id}')" title="Delete">&#10005;</button>
      <div class="graph-card-name">${g.name||'Untitled'}</div>
      <div class="graph-card-meta">${(g.years||[]).length} time points &middot; ${(g.rows||[]).filter(r=>r.name).length} series</div>
    </div>`).join('');
}

function showNewGraphModal() {
  document.getElementById('newGraphName').value='';
  document.getElementById('newGraphModal').classList.add('show');
  setTimeout(()=>document.getElementById('newGraphName').focus(), 50);
}
function hideNewGraphModal() { document.getElementById('newGraphModal').classList.remove('show'); }

async function confirmNewGraph() {
  const name = document.getElementById('newGraphName').value.trim();
  if(!name) return;
  hideNewGraphModal();
  await createAndOpenGraph(name);
}

async function createAndOpenGraph(name) {
  const { data, error } = await sb.from('graphs').insert({
    user_id:    currentUid,
    name,
    years:      [...__defaultYears],
    rows:       __defaultRows(),
    imgs:       {},
    title_img:  null,
    updated_at: new Date().toISOString()
  }).select('id').single();
  if(error || !data) { toast('Could not create graph.'); return; }
  await openGraph(data.id);
}

async function openGraph(id) {
  currentGraphId = id;
  document.getElementById('currentGraphName').textContent = 'Loading…';
  showPage('editorPage');

  const { data: g, error } = await sb.from('graphs')
    .select('*').eq('id', id).eq('user_id', currentUid).single();
  if(error || !g) { toast('Graph not found.'); backToProfile(); return; }

  document.getElementById('currentGraphName').textContent = g.name || 'Untitled';
  years = g.years ? [...g.years] : [...__defaultYears];
  rows  = g.rows  ? g.rows.map(r=>({name:r.name, values:[...r.values]})) : __defaultRows();
  imgs  = {};
  chartData=null; progress=0; playing=false;
  if(raf){cancelAnimationFrame(raf);raf=null;}

  const logoSrc = g.title_img || LOGO_B64;
  const titleEl = new Image();
  titleEl.onload = ()=>{ titleImg={url:logoSrc,el:titleEl}; renderTitleImg(); };
  titleEl.src = logoSrc;

  const imgEntries = Object.entries(g.imgs||{});
  let pending = imgEntries.length;
  const finish = ()=>{ renderTable(); resizeCanvas(); drawPlaceholder(); updatePlayBtn(); };
  if(pending===0){ finish(); }
  else {
    imgEntries.forEach(([ri,b64])=>{
      const el=new Image();
      el.onload=()=>{ imgs[ri]={url:b64,el}; pending--; if(pending===0) finish(); };
      el.onerror=()=>{ pending--; if(pending===0) finish(); };
      el.src=b64;
    });
  }
}

async function deleteGraph(id) {
  if(!confirm('Delete this graph? This cannot be undone.')) return;
  await sb.from('graphs').delete().eq('id', id).eq('user_id', currentUid);
  renderGraphCards();
}

function backToProfile() {
  if(raf){cancelAnimationFrame(raf);raf=null;} playing=false;
  openProfile();
}

async function saveGraphToProfile() {
  if(!currentGraphId) return;
  const btn = document.querySelector('.save-profile-btn');
  btn.textContent='⏳ Saving…'; btn.disabled=true;

  const imgData={};
  for(const [ri,imgObj] of Object.entries(imgs)){
    try { imgData[ri] = await compressImage(imgToBase64(imgObj.el)); }
    catch(e){ imgData[ri]=imgObj.url; }
  }
  let titleB64=null;
  if(titleImg){ try{ titleB64=await compressImage(imgToBase64(titleImg.el)); }catch(e){ titleB64=titleImg.url; } }

  const { error } = await sb.from('graphs').update({
    name:       document.getElementById('currentGraphName').textContent,
    years:      [...years],
    rows:       rows.map(r=>({name:r.name, values:[...r.values]})),
    imgs:       imgData,
    title_img:  titleB64,
    updated_at: new Date().toISOString()
  }).eq('id', currentGraphId).eq('user_id', currentUid);

  if(error) toast('Save failed — check your connection.');
  else toast('Saved to profile!');
  btn.textContent='Save to Profile'; btn.disabled=false;
}

/* =====================================================
   RENAME
===================================================== */
function startRename() {
  const nameEl = document.getElementById('currentGraphName');
  const wrap = nameEl.parentElement;
  const cur = nameEl.textContent;
  wrap.innerHTML=`<input class="graph-name-input" id="renameInput" value="${cur.replace(/"/g,'&quot;')}" maxlength="60">`;
  const inp=document.getElementById('renameInput');
  inp.focus(); inp.select();
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter') confirmRename();
    if(e.key==='Escape') cancelRename(cur);
  });
  inp.addEventListener('blur', confirmRename);
}

async function confirmRename() {
  const inp=document.getElementById('renameInput'); if(!inp) return;
  const newName=inp.value.trim()||'Untitled';
  restoreNameDisplay(newName);
  const { error } = await sb.from('graphs')
    .update({ name: newName })
    .eq('id', currentGraphId)
    .eq('user_id', currentUid);
  if(error) toast('Rename failed.'); else toast('Renamed to "'+newName+'"');
}

function cancelRename(original) {
  const inp=document.getElementById('renameInput'); if(!inp) return;
  inp.removeEventListener('blur',confirmRename);
  restoreNameDisplay(original);
}

function restoreNameDisplay(name) {
  const wrap=document.querySelector('.graph-name-wrap'); if(!wrap) return;
  wrap.innerHTML=`<span class="current-graph-name" id="currentGraphName">${name}</span>
    <button class="rename-btn" onclick="startRename()" title="Rename graph">&#9998;</button>`;
}

/* =====================================================
   IMAGE COMPRESSION
===================================================== */
function compressImage(dataUrl, maxDim=400) {
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.naturalWidth, h=img.naturalHeight;
      if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
      else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',0.75));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

/* =====================================================
   EDITOR STATE
===================================================== */
const COLORS = ['#1565c0','#1e88e5','#8e24aa','#e91e63','#f9a825','#2e7d32','#d84315','#00695c','#6a1b9a','#c62828','#37474f','#00838f'];

const __defaultYears = ['1949','1953','1957','1961','1965','1969','1972','1976','1980','1983','1987'];
function __defaultRows(){
  return [
    {name:'FLAP',      values:['31','45.2','50.2','45.3','47.6','46.1','44.9','48.6','44.5','48.8','44.3']},
    {name:'COMER',     values:['29.2','28.8','31.8','36.2','39.3','42.7','45.8','42.6','42.9','38.2','37']},
    {name:'Royalists', values:['11.9','9.5','7.7','12.8','9.5','5.8','8.4','7.9','10.6','7','9.1']},
    {name:'Westfield', values:['','','','','','','','1.5','5.6','8.3','5.1']},
    {name:'Tempenists',values:['27.6','16.3','10.2','5.6','3.6','5.4','0.9','0.9','0.5','0.4','1.3']},
    {name:'',values:new Array(11).fill('')},
    {name:'',values:new Array(11).fill('')},
    {name:'',values:new Array(11).fill('')},
  ];
}

let years = [...__defaultYears];
let rows  = [];
let imgs  = {};
let titleImg = null;

(function(){
  const el=new Image();
  el.onload=()=>{ titleImg={url:LOGO_B64,el}; };
  el.src=LOGO_B64;
})();


let chartData = null;
let progress  = 0;
let playing   = false;
let speed     = 1.0;
let lastTs    = null;
let raf       = null;

/* ═══════════════════════════ INIT ═══════════════════════════ */
(function init(){
  if(window.__EXPORT_DATA__){
    window.__EXPORT_MODE__ = true;
    const d = window.__EXPORT_DATA__;
    years = d.years; rows = d.rows;
    const allImgEntries = Object.entries(d.imgs||{});
    const loadTitle = new Promise(res=>{
      if(d.titleImg){ const el=new Image(); el.onload=()=>{ titleImg={url:d.titleImg,el}; renderTitleImg(); res(); }; el.onerror=()=>res(); el.src=d.titleImg; } else res();
    });
    let pending = allImgEntries.length;
    const finish = ()=>{ renderTable(); resizeCanvas(); drawPlaceholder(); };
    loadTitle.then(()=>{
      if(pending===0){ finish(); return; }
      allImgEntries.forEach(([ri,b64])=>{ const el=new Image(); el.onload=()=>{ imgs[ri]={url:b64,el}; pending--; if(pending===0) finish(); }; el.onerror=()=>{ pending--; if(pending===0) finish(); }; el.src=b64; });
    });
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('editorPage').classList.add('active');
    document.querySelector('.editor-topbar').style.display='none';
  }
})();

/* ═══════════════════════════ TABLE ═══════════════════════════ */
function renderTable(){
  const wrap = document.getElementById('tableWrap');
  let h = `<table><thead><tr>
    <th class="col-a"><div class="th-inner">Name</div></th>
    <th class="col-b"><div class="th-inner">Photo</div></th>`;
  years.forEach((y,yi)=>{
    h += `<th><input class="year-input" value="${esc(y)}" oninput="years[${yi}]=this.value"></th>`;
  });
  h += '</tr></thead><tbody>';

  rows.forEach((row, ri)=>{
    const col = COLORS[ri % COLORS.length];
    h += `<tr>`;
    h += `<td class="col-a">
      <div class="name-cell-inner">
        <span class="color-dot" style="background:${col}"></span>
        <input class="name-input" type="text" placeholder="Name…" value="${esc(row.name)}"
          oninput="rows[${ri}].name=this.value">
      </div></td>`;

    h += `<td class="col-b"><div class="img-cell-inner" id="imgcell-${ri}">`;
    if(imgs[ri]){
      h += `<div class="thumb-wrap" onclick="triggerUpload(${ri})" title="Click to change">
        <img class="thumb" src="${imgs[ri].url}">
        <div class="thumb-overlay">✎</div>
      </div>`;
    } else {
      h += `<label class="upload-btn" title="Upload photo">
        <input type="file" accept="image/*" onchange="handleImg(${ri},event)">+
      </label>`;
    }
    h += `</div></td>`;

    row.values.forEach((v,yi)=>{
      h += `<td class="val-td"><input class="val-input" type="number" step="any"
        value="${v}" placeholder="—"
        oninput="rows[${ri}].values[${yi}]=this.value"></td>`;
    });
    h += `</tr>`;
  });
  h += '</tbody></table>';
  wrap.innerHTML = h;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function addRow(){
  rows.push({name:'', values: new Array(years.length).fill('')});
  renderTable();
}
function removeLastRow(){
  if(rows.length > 1){ rows.pop(); renderTable(); }
}
function addYear(){
  const last = parseInt(years[years.length-1])||2020;
  years.push(String(last+1));
  rows.forEach(r => r.values.push(''));
  renderTable();
}

/* ── TITLE IMAGE ── */
function handleTitleImg(e){
  const file = e.target.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  const el  = new Image();
  el.onload = ()=>{ titleImg={url,el}; renderTitleImg(); };
  el.src = url;
}
function renderTitleImg(){
  const area = document.getElementById('titleLogoArea');
  if(!area) return;
  if(titleImg){
    area.innerHTML = `<div class="title-logo-wrap" onclick="triggerTitleUpload()" title="Click to change">
      <img class="title-logo" src="${titleImg.url}">
      <div class="title-logo-overlay">✎</div>
    </div>`;
  } else {
    area.innerHTML = `<label class="title-logo-upload" title="Upload logo image">
      <input type="file" accept="image/*" onchange="handleTitleImg(event)">+
    </label>`;
  }
}
function triggerTitleUpload(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange=e=>handleTitleImg(e);
  inp.click();
}

/* ── ROW IMAGE UPLOAD ── */
function triggerUpload(ri){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange = e => handleImg(ri, e);
  inp.click();
}
function handleImg(ri, e){
  const file = e.target.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  const el  = new Image();
  el.onload = ()=>{
    imgs[ri] = {url, el};
    const cell = document.getElementById(`imgcell-${ri}`);
    if(cell){
      cell.innerHTML = `<div class="thumb-wrap" onclick="triggerUpload(${ri})" title="Click to change">
        <img class="thumb" src="${url}">
        <div class="thumb-overlay">✎</div>
      </div>`;
    }
  };
  el.src = url;
}

/* ═══════════════════════════ CHART ═══════════════════════════ */
function buildChartData(){
  return rows.map((row,ri)=>{
    const pts = row.values.map((v,yi)=>({yi, y: v==='' ? NaN : parseFloat(v)}));
    if(!pts.some(p=>!isNaN(p.y))) return null;
    return {
      name:  row.name || `Series ${ri+1}`,
      color: COLORS[ri % COLORS.length],
      img:   imgs[ri] ? imgs[ri].el : null,
      pts
    };
  }).filter(Boolean);
}

function generateChart(){
  chartData = buildChartData();
  progress  = 0; playing = false; lastTs = null;
  if(raf){ cancelAnimationFrame(raf); raf=null; }
  updatePlayBtn(); resizeCanvas(); draw();
}

function togglePlay(){
  if(!chartData) generateChart();
  if(progress >= years.length-1) progress = 0;
  playing = !playing;
  updatePlayBtn();
  if(playing){ lastTs=null; raf=requestAnimationFrame(loop); }
  else if(raf){ cancelAnimationFrame(raf); raf=null; }
}
function replayChart(){
  if(!chartData) generateChart();
  progress=0; playing=true; lastTs=null;
  if(raf) cancelAnimationFrame(raf);
  updatePlayBtn();
  raf = requestAnimationFrame(loop);
}
function setSpeed(v){
  speed = parseFloat(v);
  document.getElementById('speedLabel').textContent = speed.toFixed(1)+'×';
}
function loop(ts){
  if(!lastTs) lastTs=ts;
  const dt=(ts-lastTs)/1000; lastTs=ts;
  progress += dt*speed;
  const max = years.length-1;
  if(progress>=max){ progress=max; playing=false; updatePlayBtn(); }
  draw();
  if(playing) raf=requestAnimationFrame(loop);
}
function updatePlayBtn(){
  const b=document.getElementById('playBtn');
  b.textContent = playing ? '⏸ Pause' : '▶ Play';
  b.className   = 'ctrl-btn '+(playing?'play-active':'play-inactive');
}

/* ── CANVAS SIZING ── */
function resizeCanvas(){
  const c   = document.getElementById('chart');
  const par = c.parentElement;
  const dpr = window.devicePixelRatio||1;
  const w   = par.clientWidth;
  const h   = 480;
  c.width   = w*dpr; c.height = h*dpr;
  c.style.width = w+'px'; c.style.height = h+'px';
  c.getContext('2d').scale(dpr,dpr);
  c._logW = w; c._logH = h;
}

/* ── DRAW ── */
function drawPlaceholder(){
  const c = document.getElementById('chart');
  const ctx = c.getContext('2d');
  const W=c._logW||c.width, H=c._logH||c.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#d0d5e0'; ctx.font='15px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Fill in the spreadsheet and click "Generate Chart"', W/2, H/2);
}

function draw(){
  const c = document.getElementById('chart');
  const ctx = c.getContext('2d');
  const W = c._logW||c.width, H = c._logH||c.height;
  ctx.clearRect(0,0,W,H);
  if(!chartData||chartData.length===0){ drawPlaceholder(); return; }

  const n   = years.length;
  const pad = {top:40, right:220, bottom:56, left:64};
  const cW  = W-pad.left-pad.right, cH = H-pad.top-pad.bottom;

  const allY = chartData.flatMap(d=>d.pts.map(p=>p.y)).filter(v=>!isNaN(v));
  if(!allY.length) return;
  const rawMax  = Math.max(...allY);
  const rawMin  = 0;
  const niceMax = Math.ceil(rawMax*1.12/10)*10||10;

  const xS = i => pad.left+(i/(n-1))*cW;
  const yS = v => pad.top+cH-((v-rawMin)/(niceMax-rawMin))*cH;

  // Grid
  ctx.save();
  ctx.strokeStyle='#eaecf4'; ctx.lineWidth=1;
  for(let t=0;t<=6;t++){
    const v=rawMin+(niceMax-rawMin)*(t/6), yy=yS(v);
    ctx.beginPath(); ctx.moveTo(pad.left,yy); ctx.lineTo(pad.left+cW,yy); ctx.stroke();
    ctx.fillStyle='#b0b6c8'; ctx.font='11px sans-serif'; ctx.textAlign='right';
    ctx.fillText(Math.round(v), pad.left-8, yy+4);
  }
  ctx.restore();

  // X ticks
  ctx.save();
  ctx.fillStyle='#b0b6c8'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  ctx.strokeStyle='#dde0ea'; ctx.lineWidth=1;
  for(let i=0;i<n;i++){
    const x=xS(i), y=pad.top+cH;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+5); ctx.stroke();
    ctx.fillText(years[i], x, y+18);
  }
  ctx.restore();

  // Axes
  ctx.save();
  ctx.strokeStyle='#c8ccd8'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(pad.left,pad.top); ctx.lineTo(pad.left,pad.top+cH);
  ctx.lineTo(pad.left+cW,pad.top+cH); ctx.stroke();
  ctx.restore();

  const cur = progress;
  const sorted = [...chartData].sort((a,b)=>(interpVal(a,cur)??-Infinity)-(interpVal(b,cur)??-Infinity));

  sorted.forEach(series=>{
    const col=series.color;
    ctx.save();
    ctx.strokeStyle=col; ctx.lineWidth=3; ctx.lineJoin='round'; ctx.lineCap='round';
    ctx.shadowColor=col+'55'; ctx.shadowBlur=10;

    const path=new Path2D();
    let started=false, lastX=null, lastY=null;
    const maxFull=Math.floor(cur);

    for(let i=0;i<=Math.min(maxFull,n-1);i++){
      const p=series.pts[i];
      if(isNaN(p.y)){ started=false; continue; }
      const x=xS(i), y=yS(p.y);
      if(!started){ path.moveTo(x,y); started=true; } else path.lineTo(x,y);
      lastX=x; lastY=y;
    }
    const frac=cur%1;
    if(frac>0&&maxFull<n-1){
      const pA=series.pts[maxFull], pB=series.pts[maxFull+1];
      if(pA&&pB&&!isNaN(pA.y)&&!isNaN(pB.y)){
        const iv=pA.y+(pB.y-pA.y)*frac, x=xS(cur), y=yS(iv);
        if(started) path.lineTo(x,y); else path.moveTo(x,y);
        lastX=x; lastY=y;
      }
    }
    ctx.stroke(path);
    ctx.restore();

    if(lastX!==null){
      const R=17, iv=interpVal(series,cur);
      const label=series.name+(iv!=null?'  '+iv.toFixed(2):'');
      ctx.save();
      ctx.beginPath(); ctx.arc(lastX,lastY,R,0,Math.PI*2);
      if(series.img){ ctx.clip(); ctx.drawImage(series.img,lastX-R,lastY-R,R*2,R*2); }
      else {
        ctx.fillStyle=col; ctx.fill();
        ctx.fillStyle='white'; ctx.font=`bold ${R}px sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText((series.name||'?')[0].toUpperCase(), lastX, lastY);
      }
      ctx.restore();
      ctx.beginPath(); ctx.arc(lastX,lastY,R,0,Math.PI*2);
      ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.stroke();
      ctx.font='bold 13px sans-serif'; ctx.fillStyle=col;
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(label, lastX+R+7, lastY);
    }
  });

  document.getElementById('bigYear').textContent = years[Math.min(Math.floor(cur),n-1)]||'';
}

function interpVal(series,cur){
  const i=Math.floor(cur), frac=cur%1;
  const pA=series.pts[Math.min(i,series.pts.length-1)];
  if(!pA||isNaN(pA.y)) return null;
  if(frac>0&&i<series.pts.length-1){
    const pB=series.pts[i+1];
    if(pB&&!isNaN(pB.y)) return pA.y+(pB.y-pA.y)*frac;
  }
  return pA.y;
}

window.addEventListener('resize',()=>{ resizeCanvas(); if(chartData) draw(); else drawPlaceholder(); });

/* ═══════════════════════════ SAVE & SHARE ═══════════════════════════ */

/* 1 ── Save PNG */
function savePNG(){
  if(!chartData){ toast('Generate the chart first.'); return; }
  // Pause, draw final frame, then download
  const wasPlaying = playing;
  if(playing){ playing=false; if(raf){ cancelAnimationFrame(raf); raf=null; } updatePlayBtn(); }
  draw();
  const c = document.getElementById('chart');
  const a = document.createElement('a');
  a.download = 'duni-chart.png';
  a.href = c.toDataURL('image/png');
  a.click();
  if(wasPlaying){ playing=true; updatePlayBtn(); lastTs=null; raf=requestAnimationFrame(loop); }
  toast('PNG saved!');
}

/* 2 ── Save Data (JSON) */
function saveData(){
  const payload = { years: [...years], rows: rows.map(r=>({name:r.name, values:[...r.values]})) };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.download = 'duni-chart-data.json';
  a.href = URL.createObjectURL(blob);
  a.click();
  toast('Data saved as JSON!');
}

/* 3 ── Load Data (JSON) */
function loadData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if(!d.years||!d.rows) throw new Error('Invalid format');
      years = d.years;
      rows  = d.rows;
      // Ensure each row has enough value slots
      rows.forEach(r=>{ while(r.values.length<years.length) r.values.push(''); });
      imgs  = {}; // images are not in JSON save — user re-uploads if needed
      chartData = null;
      renderTable();
      resizeCanvas();
      drawPlaceholder();
      toast('Data loaded! Upload photos if needed, then click Generate Chart.');
    } catch(err){
      toast('Could not read file — is it a valid JSON save?');
    }
    e.target.value = ''; // reset input so same file can be re-loaded
  };
  reader.readAsText(file);
}

/* 4 ── Export HTML (fully self-contained, images embedded as base64) */
async function exportHTML(){
  toast('Preparing export…');
  // Convert any loaded images to base64
  const imgData = {};
  for(const [ri, imgObj] of Object.entries(imgs)){
    try { imgData[ri] = imgToBase64(imgObj.el); }
    catch(e){ imgData[ri] = imgObj.url; } // blob URL fallback (same-origin)
  }

  let titleImgB64 = null;
  if(titleImg){ try{ titleImgB64=imgToBase64(titleImg.el); }catch(e){ titleImgB64=titleImg.url; } }

  const exportPayload = {
    years:    [...years],
    rows:     rows.map(r=>({name:r.name, values:[...r.values]})),
    imgs:     imgData,
    titleImg: titleImgB64
  };

  // Get the current page HTML and inject the data before </head>
  const raw = document.documentElement.outerHTML;
  const dataTag = `<script>window.__EXPORT_DATA__=${JSON.stringify(exportPayload)};<\/script>`;
  const exported = raw.replace('</head>', dataTag + '\n</head>');

  const blob = new Blob([exported], {type:'text/html'});
  const a = document.createElement('a');
  a.download = 'duni-running-chart.html';
  a.href = URL.createObjectURL(blob);
  a.click();
  toast('HTML exported — ready to share!');
}

function imgToBase64(imgEl){
  const c = document.createElement('canvas');
  c.width  = imgEl.naturalWidth  || 200;
  c.height = imgEl.naturalHeight || 200;
  c.getContext('2d').drawImage(imgEl, 0, 0);
  return c.toDataURL('image/png');
}

/* ── TOAST ── */
let toastTimer = null;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 3000);
}
